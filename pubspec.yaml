name: gtrain_training_matrix
description: Training matrix admin app for web, iOS, and Android using Firebase.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.4.4
  file_picker: ^8.1.2
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.3
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/design/reference-ui.png

dev_dependencies:
  flutter_lints: ^4.0.0
